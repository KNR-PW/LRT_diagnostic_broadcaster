diagnostic_broadcaster:
  joint_names:
    type: string_array
    read_only: true
    default_value: []
    validation:
      unique<>: null
    description: "Names of joints"
    

  interface_names:
    type: string_array
    description: "Names of diagnostic interfaces"
    default_value: [
      "temperature", 
      "fault", 
      "motor_effort", 
      "motor_position", 
      "motor_desired_position", 
      "motor_position_error", 
      "motor_velocity", 
      "motor_desired_velocity", 
      "motor_velocity_error",
      "motor_desired_effort",
      "power",
      "current",
      "voltage",
      "desired_position",
      "position_error",
      "desired_velocity",
      "velocity_error",
      "desired_effort",
      mode]
    read_only: true
    validation:
      subset_of<>: [[
        "temperature",
        "fault",
        "motor_effort",
        "motor_position", 
        "motor_desired_position", 
        "motor_position_error", 
        "motor_velocity", 
        "motor_desired_velocity", 
        "motor_velocity_error",
        "motor_desired_effort",
        "power",
        "current",
        "voltage",
        "desired_position",
        "position_error",
        "desired_velocity",
        "velocity_error",
        "desired_effort",
        "mode"
           ]]
      unique<>: null
      not_empty<>: null

  interface_params:
    __map_interface_names:
      update_threshold:
        type: double
        default_value: 0.1
        read_only: true
        description: "When interface values change by this amount, it will be noticed"
